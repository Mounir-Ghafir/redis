# Redis Configuration File
# Example configuration for production

# Network
port 6379
bind 127.0.0.1
tcp-keepalive 300
timeout 0

# General
loglevel INFO
logfile null

# Snapshotting
dir .
dbfilename dump.rdb

# Append Only Mode
appendonly no
appenddirname appendonlydir
appendfilename appendonly.aof
appendfsync everysec

# Memory
maxmemory null
maxmemory-policy noeviction

# Security
# requirepass yourpassword

# Rate Limiting
ratelimitmax 1000
ratelimitwindow 1000

# Clients
maxclients 10000