version: '3.8'

services:
  redis:
    build: .
    ports:
      - "6379:6379"
    volumes:
      - ./data:/data
    environment:
      - PORT=6379
      - LOGLEVEL=INFO
      - DIR=/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('./app/main.js')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis-test:
    build: .
    command: npm test
    profiles:
      - test